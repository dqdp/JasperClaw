services:
  agent-api:
    ports:
      - "18080:8080"
    volumes:
      - ../config/household.ci-smoke.toml:/app/config/household.ci-smoke.toml:ro
  telegram-ingress:
    ports:
      - "18081:8080"
    volumes:
      - ../config/household.ci-smoke.toml:/app/config/household.ci-smoke.toml:ro
  ollama-fake:
    build:
      context: ../../services/ollama-fake
    ports:
      - "18083:8080"
    networks:
      - runtime
  telegram-fake:
    build:
      context: ../../services/telegram-fake
    ports:
      - "18082:8080"
    networks:
      - control
