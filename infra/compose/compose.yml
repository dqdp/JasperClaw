services:
  caddy:
    image: caddy:2
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      DOMAIN: ${DOMAIN}
    volumes:
      - ../caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      open-webui:
        condition: service_started
    networks:
      - frontend

  open-webui:
    image: ghcr.io/open-webui/open-webui:v0.8.6
    restart: unless-stopped
    environment:
      WEBUI_SECRET_KEY: ${WEBUI_SECRET_KEY}
      ENABLE_PERSISTENT_CONFIG: "False"
      ENABLE_OLLAMA_API: "False"
      ENABLE_OPENAI_API: "True"
      OPENAI_API_BASE_URL: http://agent-api:8080/v1
      OPENAI_API_KEY: ${INTERNAL_OPENAI_API_KEY}
      AUDIO_STT_ENGINE: openai
      AUDIO_STT_MODEL: whisper-1
      AUDIO_STT_OPENAI_API_BASE_URL: http://agent-api:8080/v1
      AUDIO_STT_OPENAI_API_KEY: ${INTERNAL_OPENAI_API_KEY}
      AUDIO_TTS_ENGINE: openai
      AUDIO_TTS_MODEL: tts-1
      AUDIO_TTS_VOICE: ${TTS_DEFAULT_VOICE:-assistant-default}
      AUDIO_TTS_OPENAI_API_BASE_URL: http://agent-api:8080/v1
      AUDIO_TTS_OPENAI_API_KEY: ${INTERNAL_OPENAI_API_KEY}
      TASK_MODEL_EXTERNAL: assistant-fast
    volumes:
      - open_webui_data:/app/backend/data
    depends_on:
      agent-api:
        condition: service_healthy
    networks:
      - frontend
      - control

  agent-api:
    build:
      context: ../..
      dockerfile: services/agent-api/Dockerfile
    image: ghcr.io/${GHCR_OWNER}/local-assistant-agent:${APP_VERSION}
    restart: unless-stopped
    env_file:
      - ../env/app.env
    volumes:
      - ../config/household.demo.toml:/app/config/household.demo.toml:ro
    environment:
      INTERNAL_OPENAI_API_KEY: ${INTERNAL_OPENAI_API_KEY}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    depends_on:
      postgres:
        condition: service_healthy
      ollama:
        condition: service_started
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8080/readyz')"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - control
      - runtime

  platform-db:
    build:
      context: ../..
      dockerfile: platform-db/Dockerfile
    image: ghcr.io/${GHCR_OWNER}/local-assistant-db-admin:${APP_VERSION}
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: assistant
      POSTGRES_USER: assistant
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - runtime

  ollama:
    image: ollama/ollama:0.12.4
    restart: unless-stopped
    volumes:
      - ollama_data:/root/.ollama
    networks:
      - runtime

  postgres:
    image: pgvector/pgvector:pg17
    restart: unless-stopped
    environment:
      POSTGRES_DB: assistant
      POSTGRES_USER: assistant
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U assistant -d assistant"]
      interval: 10s
      timeout: 5s
      retries: 10
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - runtime

  telegram-ingress:
    build:
      context: ../..
      dockerfile: services/telegram-ingress/Dockerfile
    image: ghcr.io/${GHCR_OWNER}/local-assistant-telegram-ingress:${APP_VERSION}
    restart: unless-stopped
    env_file:
      - path: ../env/telegram.env
        required: false
    volumes:
      - ../config/household.demo.toml:/app/config/household.demo.toml:ro
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: assistant
      POSTGRES_USER: assistant
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    depends_on:
      agent-api:
        condition: service_started
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8080/healthz')\""]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - control
      - frontend
      - runtime

  prometheus:
    image: prom/prometheus:v3.5.0
    restart: unless-stopped
    profiles: ["observability"]
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --web.enable-lifecycle
    ports:
      - "9090:9090"
    volumes:
      - ./observability/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./observability/prometheus/alerts:/etc/prometheus/alerts:ro
      - prometheus_data:/prometheus
    depends_on:
      agent-api:
        condition: service_started
      telegram-ingress:
        condition: service_started
    networks:
      - control

  grafana:
    image: grafana/grafana:12.2.0
    restart: unless-stopped
    profiles: ["observability"]
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    ports:
      - "3000:3000"
    volumes:
      - ./observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./observability/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    depends_on:
      prometheus:
        condition: service_started
    networks:
      - control

  stt-service:
    build:
      context: ../../services/stt-service
    image: ghcr.io/${GHCR_OWNER}/local-assistant-stt:${APP_VERSION}
    restart: unless-stopped
    env_file:
      - ../env/app.env
    networks:
      - runtime

  tts-service:
    build:
      context: ../../services/tts-service
    image: ghcr.io/${GHCR_OWNER}/local-assistant-tts:${APP_VERSION}
    restart: unless-stopped
    env_file:
      - ../env/app.env
    networks:
      - runtime

volumes:
  open_webui_data:
  ollama_data:
  postgres_data:
  caddy_data:
  caddy_config:
  prometheus_data:
  grafana_data:

networks:
  frontend:
  control:
  runtime:
