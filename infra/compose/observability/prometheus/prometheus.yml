global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/alerts/*.yml

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ["prometheus:9090"]

  - job_name: agent-api
    metrics_path: /metrics
    static_configs:
      - targets: ["agent-api:8080"]

  - job_name: telegram-ingress
    metrics_path: /metrics
    static_configs:
      - targets: ["telegram-ingress:8080"]
