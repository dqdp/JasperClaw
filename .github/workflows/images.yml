name: images

on:
  push:
    branches: [main]
    tags: ['v*.*.*']

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        include:
          - service: agent-api
            image_name: local-assistant-agent
          - service: stt-service
            image_name: local-assistant-stt
          - service: tts-service
            image_name: local-assistant-tts
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Compute image tags
        id: meta
        shell: bash
        run: |
          image="ghcr.io/${{ github.repository_owner }}/${{ matrix.image_name }}"
          tags="${image}:${GITHUB_SHA}"
          if [[ "${GITHUB_REF}" == "refs/heads/main" ]]; then
            tags="${tags}"$'\n'"${image}:latest"
          fi
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            tags="${tags}"$'\n'"${image}:${GITHUB_REF_NAME}"
          fi
          {
            echo "tags<<EOF"
            printf '%s\n' "${tags}"
            echo "EOF"
          } >> "${GITHUB_OUTPUT}"
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: ./services/${{ matrix.service }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
