name: deploy-prod

on:
  workflow_dispatch:
    inputs:
      app_version:
        description: Immutable image tag to deploy
        required: true
        type: string

concurrency:
  group: deploy-prod
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.PROD_HOST }}
          username: ${{ secrets.PROD_USER }}
          key: ${{ secrets.PROD_SSH_KEY }}
          script: |
            cd /opt/local-assistant
            export APP_VERSION=${{ inputs.app_version }}
            echo ${{ secrets.GHCR_PULL_TOKEN }} | docker login ghcr.io -u ${{ secrets.GHCR_PULL_USER || github.repository_owner }} --password-stdin
            bash infra/scripts/deploy.sh
