name: ci

on:
  push:
  pull_request:

jobs:
  lint-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: python -m pip install --upgrade pip
      - run: python -m pip install -r requirements-dev.txt
      - run: ruff check services
      - run: PYTHON_BIN=python bash infra/scripts/test-python-services.sh

  validate-compose:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: cp .env.example .env
      - run: mkdir -p infra/env
      - run: cp infra/env/app.example.env infra/env/app.env
      - run: docker compose --env-file .env -f infra/compose/compose.yml config >/tmp/compose.out
