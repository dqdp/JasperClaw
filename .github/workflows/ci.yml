name: ci

on:
  push:
  pull_request:

jobs:
  lint-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install ruff pytest
      - run: ruff check services
      - run: pytest services

  validate-compose:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: cp .env.example .env
      - run: mkdir -p infra/env
      - run: cp infra/env/app.example.env infra/env/app.env
      - run: docker compose --env-file .env -f infra/compose/compose.yml config >/tmp/compose.out
