name: ci

on:
  push:
  pull_request:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  lint-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: python -m pip install --upgrade pip
      - run: python -m pip install -r requirements-dev.txt
      - run: ruff check services
      - run: PYTHON_BIN=python bash infra/scripts/test-python-services.sh

  smoke-model:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: cp infra/env/app.ci-smoke.example.env infra/env/app.env
      - run: cp infra/env/telegram.ci-smoke.example.env infra/env/telegram.env
      - run: docker compose --env-file infra/env/root.ci-smoke.example.env -f infra/compose/compose.yml -f infra/compose/compose.ci.yml build agent-api telegram-ingress ollama-fake telegram-fake
      - run: docker compose --env-file infra/env/root.ci-smoke.example.env -f infra/compose/compose.yml -f infra/compose/compose.ci.yml up -d postgres ollama-fake telegram-fake
      - name: Wait for postgres
        run: |
          until docker compose --env-file infra/env/root.ci-smoke.example.env -f infra/compose/compose.yml -f infra/compose/compose.ci.yml exec -T postgres pg_isready -U assistant -d assistant; do
            sleep 2
          done
      - run: docker compose --env-file infra/env/root.ci-smoke.example.env -f infra/compose/compose.yml -f infra/compose/compose.ci.yml run --rm --no-deps agent-api python -m app.cli migrate
      - run: docker compose --env-file infra/env/root.ci-smoke.example.env -f infra/compose/compose.yml -f infra/compose/compose.ci.yml up -d --no-deps agent-api telegram-ingress
      - name: Run lightweight runtime smoke
        env:
          SMOKE_BASE_URL: http://127.0.0.1:18080
          SMOKE_INTERNAL_OPENAI_API_KEY: ci-smoke-key
          SMOKE_TIMEOUT_SECONDS: "180"
        run: python infra/scripts/smoke-agent-api.py
      - name: Run telegram ingress smoke
        env:
          TELEGRAM_SMOKE_BASE_URL: http://127.0.0.1:18081
          TELEGRAM_FAKE_BASE_URL: http://127.0.0.1:18082
          TELEGRAM_SMOKE_WEBHOOK_PATH: /telegram/webhook
          TELEGRAM_SMOKE_WEBHOOK_SECRET_TOKEN: ci-webhook-secret
          TELEGRAM_SMOKE_BOT_TOKEN: ci-telegram-bot
          TELEGRAM_SMOKE_ALERT_AUTH_TOKEN: ci-alert-secret
          TELEGRAM_SMOKE_ALERT_BOT_TOKEN: ci-telegram-alert-bot
          TELEGRAM_SMOKE_ALERT_CHAT_IDS: "9001"
          TELEGRAM_SMOKE_ALERT_WARNING_CHAT_IDS: "9002"
          TELEGRAM_SMOKE_ALERT_CRITICAL_CHAT_IDS: "9003"
          TELEGRAM_SMOKE_TIMEOUT_SECONDS: "180"
        run: python infra/scripts/smoke-telegram-ingress.py
      - name: Dump smoke logs on failure
        if: failure()
        run: |
          docker compose --env-file infra/env/root.ci-smoke.example.env -f infra/compose/compose.yml -f infra/compose/compose.ci.yml logs --no-color postgres ollama-fake agent-api telegram-ingress telegram-fake
      - name: Tear down smoke stack
        if: always()
        run: docker compose --env-file infra/env/root.ci-smoke.example.env -f infra/compose/compose.yml -f infra/compose/compose.ci.yml down -v

  validate-compose:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: cp .env.example .env
      - run: mkdir -p infra/env
      - run: cp infra/env/app.example.env infra/env/app.env
      - run: docker compose --env-file .env -f infra/compose/compose.yml config >/tmp/compose.out
      - run: 'grep -n "INTERNAL_OPENAI_API_KEY: change-me" /tmp/compose.out'
